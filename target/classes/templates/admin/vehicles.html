<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Vehicles</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<h1>Manage Vehicles</h1>
<a th:href="@{/admin/dashboard}">Back to Dashboard</a>
<table border="1">
    <tr><th>ID</th><th>Model</th><th>Type</th><th>Brand</th><th>Price</th><th>Available</th><th>Actions</th></tr>
    <tr th:each="v : ${vehicles}">
        <td th:text="${v.id}"></td>
        <td th:text="${v.model}"></td>
        <td th:text="${v.type}"></td>
        <td th:text="${v.brand != null ? v.brand.name : 'N/A'}"></td>
        <td th:text="${v.pricePerDay}"></td>
        <td th:text="${v.available}"></td>
        <td>
            <form th:action="@{/admin/vehicles/delete}" method="post">
                <input type="hidden" name="id" th:value="${v.id}" />
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
</table>
<h2>Add Vehicle</h2>
<form th:action="@{/admin/vehicles/save}" method="post">
    <input type="text" name="modelName" placeholder="Model" required />
    <input type="text" name="type" placeholder="Type" required />
    <select name="brandId" required>
        <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}"></option>
    </select>
    <input type="text" name="imageUrl" placeholder="Image URL" />
    <input type="text" name="pricePerDay" placeholder="Price Per Day" required />
    <input type="checkbox" name="available" checked /> Available
    <button type="submit">Save</button>
</form>
</body>
</html>
