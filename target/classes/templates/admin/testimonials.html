<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Testimonials</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<h1>Testimonials</h1>
<a th:href="@{/admin/dashboard}">Back to Dashboard</a>
<table border="1">
    <tr><th>ID</th><th>Name</th><th>Comment</th><th>Status</th><th>Actions</th></tr>
    <tr th:each="t : ${testimonials}">
        <td th:text="${t.id}"></td>
        <td th:text="${t.name}"></td>
        <td th:text="${t.comment}"></td>
        <td th:text="${t.status}"></td>
        <td>
            <form th:action="@{/admin/testimonials/approve}" method="post" style="display:inline">
                <input type="hidden" name="id" th:value="${t.id}" />
                <button type="submit">Approve</button>
            </form>
            <form th:action="@{/admin/testimonials/reject}" method="post" style="display:inline">
                <input type="hidden" name="id" th:value="${t.id}" />
                <button type="submit">Reject</button>
            </form>
        </td>
    </tr>
</table>
</body>
</html>
