<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Content</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<h1>Page Text Content</h1>
<a th:href="@{/admin/dashboard}">Back to Dashboard</a>
<table border="1">
    <tr><th>Page Key</th><th>Content</th></tr>
    <tr th:each="p : ${pageContents}">
        <td th:text="${p.pageKey}"></td>
        <td th:text="${p.content}"></td>
    </tr>
</table>
<h2>Update Content</h2>
<form th:action="@{/admin/page-content/update}" method="post">
    <input type="text" name="pageKey" placeholder="page key" required />
    <textarea name="content" placeholder="content" rows="4" cols="40"></textarea>
    <button type="submit">Save</button>
</form>
</body>
</html>
