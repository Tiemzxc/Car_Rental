<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Info</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(90deg, #8a2be2, #1e90ff);">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">Admin Panel</a>
        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/contact-info}">Contact Info</a></li>
            </ul>
        </div>
    </div>
</nav>
<main class="container py-5">
    <div class="card p-4">
        <h2>Update Contact Info</h2>
        <form th:action="@{/admin/contact-info/update}" method="post" class="row g-3">
            <input type="hidden" name="id" th:value="${contactInfo.id}" />
            <div class="col-md-4">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" name="phone" th:value="${contactInfo.phone}" required />
            </div>
            <div class="col-md-4">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" th:value="${contactInfo.email}" required />
            </div>
            <div class="col-md-4">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" name="address" th:value="${contactInfo.address}" required />
            </div>
            <div class="col-12">
                <button class="btn btn-success" type="submit">Save</button>
                <a class="btn btn-secondary" th:href="@{/admin/dashboard}">Back</a>
            </div>
        </form>
    </div>
</main>
<footer class="footer-custom text-white text-center py-3">© 2026 CarRental Admin</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
