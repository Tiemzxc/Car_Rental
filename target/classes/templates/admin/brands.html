<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Brands</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<h1>Manage Brands</h1>
<a th:href="@{/admin/dashboard}">Back to Dashboard</a>
<table border="1">
    <tr><th>ID</th><th>Name</th><th>Actions</th></tr>
    <tr th:each="brand : ${brands}">
        <td th:text="${brand.id}"></td>
        <td th:text="${brand.name}"></td>
        <td>
            <form th:action="@{/admin/brands/update}" method="post" style="display:inline">
                <input type="hidden" name="id" th:value="${brand.id}" />
                <input type="text" name="name" th:value="${brand.name}" />
                <button type="submit">Update</button>
            </form>
            <form th:action="@{/admin/brands/delete}" method="post" style="display:inline">
                <input type="hidden" name="id" th:value="${brand.id}" />
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
</table>
<h2>Add Brand</h2>
<form th:action="@{/admin/brands/create}" method="post">
    <input type="text" name="name" placeholder="Brand name" required />
    <button type="submit">Create</button>
</form>
</body>
</html>
