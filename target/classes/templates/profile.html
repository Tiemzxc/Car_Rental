<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">CarRental</a>
        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div class="row">
        <div class="col-md-4 mb-3">
            <div class="card p-3 shadow-sm">
                <h4>Profile</h4>
                <p><strong>Name:</strong> <span th:text="${user.firstName}+' '+${user.lastName}"></span></p>
                <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
                <p><strong>Contact:</strong> <span th:text="${user.contactNumber}"></span></p>
            </div>
        </div>
        <div class="col-md-8">
            <h4>Booking History</h4>
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead><tr><th>Vehicle</th><th>Start</th><th>End</th><th>Status</th><th>Fine</th></tr></thead>
                    <tbody>
                        <tr th:each="booking: ${bookings}">
                            <td th:text="${booking.vehicle.model}"></td>
                            <td th:text="${booking.startDate}"></td>
                            <td th:text="${booking.endDate}"></td>
                            <td th:text="${booking.status}"></td>
                            <td th:text="${booking.fine}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <h4>Submit Testimonial</h4>
            <form method="post" action="/testimonial" class="mb-4" novalidate>
                <textarea class="form-control mb-2" name="message" placeholder="Your feedback" required></textarea>
                <select class="form-select mb-2" name="rating" required>
                    <option value="5">5 stars</option>
                    <option value="4">4 stars</option>
                    <option value="3">3 stars</option>
                    <option value="2">2 stars</option>
                    <option value="1">1 star</option>
                </select>
                <button class="btn btn-primary" type="submit">Submit</button>
            </form>
        </div>
    </div>
</main>
<footer class="bg-light py-3 text-center">© 2026 CarRental</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
