<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Queries</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<h1>Contact Queries</h1>
<a th:href="@{/admin/dashboard}">Back to Dashboard</a>
<table border="1">
    <tr><th>ID</th><th>Name</th><th>Email</th><th>Message</th><th>Actions</th></tr>
    <tr th:each="q : ${queries}">
        <td th:text="${q.id}"></td>
        <td th:text="${q.name}"></td>
        <td th:text="${q.email}"></td>
        <td th:text="${q.message}"></td>
        <td>
            <form th:action="@{/admin/contact-queries/delete}" method="post">
                <input type="hidden" name="id" th:value="${q.id}" />
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
</table>
</body>
</html>
